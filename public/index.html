<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>NumericaLab</title>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="scanlines" aria-hidden="true"></div>

    <div class="wrapperContainer">
      <header class="headerContainer">
        <div class="logo">
          <div class="logoIcon" aria-hidden="true">
            <span class="logoBracket">[</span>
            <span class="logoSymbol">?</span>
            <span class="logoBracket">]</span>
          </div>
          <div class="slug">
            <span class="logoName">NumericaLab</span>
            <span class="logoTagline">Instituro de Hipóteses númericas</span>
          </div>
        </div>
        <div class="headerBadge">
          <span class="badge badgeLive">● EXPERIMENTO ATIVO</span>
        </div>
      </header>

      <main class="cardContainer">
        <div class="cardIntro">
          <h1 class="cardTitle">
            Desvende o <br />
            <em>Número Secreto</em>
          </h1>
          <p class="cardSubTitle">
            O laboratório gerou um número entre <strong>1</strong> e
            <strong>100</strong>. Sua missão: descobri-lo antes que as
            tentativas acabem.
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
